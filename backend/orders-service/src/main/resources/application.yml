# Configuração do orders-service.
# Variáveis com ${VAR:default} permitem sobrescrever via ambiente (Docker, K8s, CI).

server:
  port: 8082

spring:
  application:
    name: orders-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/havingfunwithjava}
    username: ${DB_USERNAME:havingfunwithjava}
    password: ${DB_PASSWORD:havingfunwithjava}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.havingfunwithjava.orders: INFO

# Cliente do catalog-service (issue #15): URL base para validar itens/preços.
# Sobrescrevível via ambiente (Docker: http://catalog-service:8081).
app:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8081}
