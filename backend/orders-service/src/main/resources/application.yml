# Configuração do orders-service.
# Variáveis com ${VAR:default} permitem sobrescrever via ambiente (Docker, K8s, CI).

server:
  port: 8082

spring:
  application:
    name: orders-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/havingfunwithjava}
    username: ${DB_USERNAME:havingfunwithjava}
    password: ${DB_PASSWORD:havingfunwithjava}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: orders
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: orders
    default-schema: orders
    create-schemas: true

  # RabbitMQ (issue #18): broker para publicar OrderCreated.
  # Sobrescrevível via ambiente (Docker: spring.rabbitmq.host=rabbitmq).
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:havingfunwithjava}
    password: ${RABBITMQ_PASSWORD:havingfunwithjava}
    # Connection recovery: tenta reconectar automaticamente se o broker cai.
    connection-timeout: 10s
    template:
      retry:
        enabled: true
        initial-interval: 1000ms
        max-attempts: 3
        multiplier: 2.0
    # Listener (issue #22): consome PaymentSucceeded/Failed da fila de resultado.
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # Tracing distribuído (issue #25): export desabilitado por default.
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: ${OTLP_ENABLED:false}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    com.havingfunwithjava.orders: INFO

# Cliente do catalog-service (issue #15): URL base para validar itens/preços.
# Sobrescrevível via ambiente (Docker: http://catalog-service:8081).
app:
  catalog:
    base-url: ${CATALOG_SERVICE_URL:http://localhost:8081}
  # RabbitMQ (issue #18): nomes da exchange, fila e routing keys.
  messaging:
    orders-exchange: orders.exchange
    payment-queue: payment.queue
    payment-routing-key: order.created
    dlx-exchange: orders.dlx
    dlq-queue: payment.dlq
    # Fila de resultado (issue #22): consome PaymentSucceeded/Failed do payment-service.
    result-queue: orders.payment-result.queue
    result-routing-key-succeeded: payment.succeeded
    result-routing-key-failed: payment.failed
