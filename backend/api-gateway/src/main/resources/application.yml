# Configuração do api-gateway (Spring Cloud Gateway, reativo/WebFlux).
# Rotas declarativas com rate limiting por grupo (issue #11):
#   - /catalog/** GET  -> generoso (60 req/min por IP)
#   - /catalog/** POST/PUT/DELETE -> moderado (20 req/min por IP)
#   - /auth/login      -> apertado (5 req/min por IP)
# StripPrefix=1 remove o prefixo /catalog antes de repassar ao upstream.
# URLs dos serviços sobrescrevíveis via variáveis de ambiente (Docker, K8s, CI).

server:
  port: 8080

spring:
  application:
    name: api-gateway

  data:
    redis:
      # Backend do ReactiveRedisRateLimiter (issue #11). Host sobrescrevível via
      # SPRING_DATA_REDIS_HOST (Docker: "redis"); default "localhost" para dev local.
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # ---------------------------------------------------------------
            # /auth/login -> handler local (forward:), limite APERTADO.
            # Login é sensível ( credential stuffing): 5 req/min por IP.
            # O filter RequestRateLimiter roda ANTES do ForwardRoutingFilter
            # (ordem LOWEST_PRECEDENCE), então o limite é aplicado ao login.
            # ---------------------------------------------------------------
            - id: auth-login
              uri: forward:/auth/login
              predicates:
                - Path=/auth/login
                - Method=POST
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_LOGIN_REPLENISH:5}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_LOGIN_BURST:5}
                    redis-rate-limiter.requestedTokens: 1

            # ---------------------------------------------------------------
            # /catalog/** escrita (POST/PUT/DELETE) -> catalog-service,
            # limite MODERADO (20 req/min por IP). Exige JWT admin (AuthenticationFilter).
            # Circuit breaker (issue #12): protege contra falhas repetidas do catalog.
            # Ordenada ANTES da rota GET para o predicate Method prevalecer.
            # ---------------------------------------------------------------
            - id: catalog-write
              uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/catalog/**
                - Method=POST,PUT,DELETE,PATCH
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_WRITE_REPLENISH:20}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_WRITE_BURST:20}
                    redis-rate-limiter.requestedTokens: 1
                - name: CircuitBreaker
                  args:
                    name: catalog-write
                    fallbackUri: forward:/fallback

            # ---------------------------------------------------------------
            # /catalog/** leitura (GET/HEAD) -> catalog-service, limite GENEROSO
            # (60 req/min por IP). Rota pública (sem token).
            # Circuit breaker (issue #12): idem catalog-write.
            # ---------------------------------------------------------------
            - id: catalog-read
              uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/catalog/**
                - Method=GET,HEAD
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_READ_REPLENISH:60}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_READ_BURST:60}
                    redis-rate-limiter.requestedTokens: 1
                - name: CircuitBreaker
                  args:
                    name: catalog-read
                    fallbackUri: forward:/fallback

            # ---------------------------------------------------------------
            # /orders/** -> orders-service (criar, listar, detalhar pedidos).
            # Rota para o fluxo de pedidos do frontend. Rate limiting moderado.
            # ---------------------------------------------------------------
            - id: orders
              uri: ${ORDERS_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/orders/**
              filters:
                - StripPrefix=1
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${RATE_LIMIT_ORDERS_REPLENISH:20}
                    redis-rate-limiter.burstCapacity: ${RATE_LIMIT_ORDERS_BURST:20}
                    redis-rate-limiter.requestedTokens: 1

# Actuator: health do próprio gateway.
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # Tracing distribuído (issue #25): OpenTelemetry via OTLP.
  # Quando OTLP_ENDPOINT não está definido, desabilita o export (só gera trace IDs nos logs).
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: ${OTLP_ENABLED:false}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    com.havingfunwithjava.gateway: INFO
    # Log de rotas do gateway em DEBUG ajuda a diagnosticar roteamento.
    org.springframework.cloud.gateway: INFO
    # Transições de estado do circuit breaker (issue #12).
    io.github.resilience4j.circuitbreaker: INFO

# Resilience4j (issue #12): circuit breakers por rota.
# Quando o catalog-service falha repetidamente (5xx/timeouts), o circuito ABRE e
# o gateway retorna fallback (forward:/fallback) em vez de propagar a falha.
# Após wait-duration-in-open-state, entra em HALF_OPEN e testa uma request; se
# passar, FECHA; se falhar, volta a OPEN.
resilience4j:
  circuitbreaker:
    configs:
      default:
        # Janela deslizante baseada em contagem: últimas N chamadas.
        sliding-window-type: count_based
        sliding-window-size: 10
        # Mínimo de chamadas na janela para avaliar o threshold.
        minimum-number-of-calls: 5
        # Threshold de taxa de falha (%). Acima disso, ABRE.
        failure-rate-threshold: 50
        # Tempo no estado OPEN antes de ir a HALF_OPEN.
        wait-duration-in-open-state: 10s
        # Chamadas de teste no estado HALF_OPEN.
        permitted-number-of-calls-in-half-open-state: 3
        # Considera 5xx e exceções (timeout, connection refused) como falhas.
        # O Spring Cloud Gateway registra o CircuitBreaker como falha quando o
        # upstream retorna 5xx ou lança erro de conexão.
        automatic-transition-from-open-to-half-open-enabled: true
    instances:
      catalog-read:
        base-config: default
      catalog-write:
        base-config: default
  # Timelimiter: tempo máximo de espera por uma request antes de falhar o circuito.
  timelimiter:
    configs:
      default:
        timeout-duration: 5s

# JWT (issue #10): segredo + expiração dos tokens emitidos em /auth/login.
# O secret default é DEV-ONLY; sobrescrever em produção via APP_JWT_SECRET
# (ou JWT_SECRET, mapeado abaixo). Requer >= 32 bytes para HS256.
app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-please-override-via-JWT_SECRET-env-var-havingfunwithjava}
    expiration-minutes: 60
  # Rate limiting (issue #11): valor do header Retry-After (segundos) adicionado
  # às respostas 429. Conservador (60s = janela de 1 minuto dos limites).
  ratelimit:
    retry-after-seconds: 60
