# Configuração do api-gateway (Spring Cloud Gateway, reativo/WebFlux).
# Rotas declarativas: /catalog/** -> catalog-service, com StripPrefix=1 para
# remover o prefixo /catalog antes de repassar ao upstream.
# URLs dos serviços sobrescrevíveis via variáveis de ambiente (Docker, K8s, CI).

server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            # /catalog/** -> catalog-service (default http://localhost:8081).
            # StripPrefix=1 faz /catalog/health -> /health no upstream.
            - id: catalog-service
              uri: ${CATALOG_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/catalog/**
              filters:
                - StripPrefix=1

# Actuator: health do próprio gateway.
management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.havingfunwithjava.gateway: INFO
    # Log de rotas do gateway em DEBUG ajuda a diagnosticar roteamento.
    org.springframework.cloud.gateway: INFO
