# Configuração do payment-service.
# Variáveis com ${VAR:default} permitem sobrescrever via ambiente (Docker, K8s, CI).

server:
  port: 8083

spring:
  application:
    name: payment-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/havingfunwithjava}
    username: ${DB_USERNAME:havingfunwithjava}
    password: ${DB_PASSWORD:havingfunwithjava}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: payment
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: payment
    default-schema: payment
    create-schemas: true

  # RabbitMQ: consome OrderCreated da payment.queue (declarada pelo orders-service).
  # O payment-service também declara a topologia (idempotente) para não depender
  # de ordem de boot entre serviços.
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:havingfunwithjava}
    password: ${RABBITMQ_PASSWORD:havingfunwithjava}
    listener:
      simple:
        # Manual ack: só confirma após processar com sucesso.
        acknowledge-mode: manual
        # Consome uma mensagem por vez (processamento sequencial, mais seguro).
        prefetch: 1
        # Retry de consumo (issue #20 aprofunda com backoff exponencial).
        retry:
          enabled: true
          initial-interval: 1000ms
          max-attempts: 3
          multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # Tracing distribuído (issue #25): export desabilitado por default.
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: ${OTLP_ENABLED:false}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    com.havingfunwithjava.payment: INFO

# Retentativas de pagamento (issue #20) + topologia RabbitMQ.
app:
  payment:
    retry:
      # Backoff exponencial para falhas transitórias do gateway.
      max-attempts: 3
      initial-delay-ms: 1000
      multiplier: 2.0
  messaging:
    orders-exchange: orders.exchange
    payment-queue: payment.queue
    payment-routing-key: order.created
    # Resultado do pagamento (issue #21): fila + routing keys consumidas pelo orders-service.
    result-queue: orders.payment-result.queue
    result-routing-key-succeeded: payment.succeeded
    result-routing-key-failed: payment.failed
