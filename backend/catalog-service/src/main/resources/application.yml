# Configuração do catalog-service.
# Variáveis com ${VAR:default} permitem sobrescrever via ambiente (Docker, K8s, CI).

server:
  port: 8081

spring:
  application:
    name: catalog-service

  # Datasource Postgres (pré-configurado para o compose local).
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/havingfunwithjava}
    username: ${DB_USERNAME:havingfunwithjava}
    password: ${DB_PASSWORD:havingfunwithjava}
    driver-class-name: org.postgresql.Driver

  # JPA / Hibernate: ddl-auto=none porque o Flyway cuida do schema (migration V1).
  jpa:
    hibernate:
        default_schema: catalog
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        default_schema: catalog
        jdbc:
          time_zone: UTC

  # Flyway: migrations versionadas em db/migration. Aplicadas na inicialização.
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Schema dedicado por serviço (evita conflito de flyway_schema_history
    # quando múltiplos serviços compartilham o mesmo banco Postgres).
    schemas: catalog
    default-schema: catalog
    create-schemas: true

# Actuator: expõe health (para o endpoint customizado /health + o do actuator).
# O management.health é default; mantemos /actuator/health público.
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
  # Tracing distribuído (issue #25): OpenTelemetry via OTLP.
  # Export desabilitado por default (OTLP_ENABLED=false). Trace IDs ainda
  # aparecem nos logs JSON. Para ativar export: OTLP_ENABLED=true
  tracing:
    sampling:
      probability: 1.0
    export:
      enabled: ${OTLP_ENABLED:false}
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4317}

logging:
  level:
    com.havingfunwithjava.catalog: INFO
