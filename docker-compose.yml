# Infraestrutura local completa da plataforma havingfunwithjava.
# Sobe TODOS os serviços (backend + frontend + infra) com um único comando.
#
# Uso:
#   docker compose up -d                  # sobe tudo
#   docker compose up -d postgres redis rabbitmq  # só a infra
#   docker compose logs -f catalog-service         # logs de um serviço
#   docker compose down                   # para e remove containers (mantém volumes)
#   docker compose down -v                # para e APAGA volumes (cuidado: perde dados)
#
# Após subir, acessar:
#   Frontend:        http://localhost:5173
#   API Gateway:     http://localhost:8080
#   RabbitMQ UI:     http://localhost:15672 (havingfunwithjava/havingfunwithjava)
#   Prometheus:      http://localhost:9090
#   Grafana:         http://localhost:3000 (admin/admin)

services:
  # ---------------------------------------------------------------
  # Infraestrutura
  # ---------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: havingfunwithjava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: havingfunwithjava
      POSTGRES_PASSWORD: havingfunwithjava
      POSTGRES_DB: havingfunwithjava
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U havingfunwithjava -d havingfunwithjava"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - havingfunwithjava-net

  redis:
    image: redis:7-alpine
    container_name: havingfunwithjava-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - havingfunwithjava-net

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: havingfunwithjava-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: havingfunwithjava
      RABBITMQ_DEFAULT_PASS: havingfunwithjava
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      - havingfunwithjava-net

  # ---------------------------------------------------------------
  # Serviços backend (build multi-stage a partir da raiz do repo)
  # ---------------------------------------------------------------

  catalog-service:
    build:
      context: .
      dockerfile: backend/catalog-service/Dockerfile
    container_name: havingfunwithjava-catalog
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/havingfunwithjava
      DB_USERNAME: havingfunwithjava
      DB_PASSWORD: havingfunwithjava
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - havingfunwithjava-net

  orders-service:
    build:
      context: .
      dockerfile: backend/orders-service/Dockerfile
    container_name: havingfunwithjava-orders
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/havingfunwithjava
      DB_USERNAME: havingfunwithjava
      DB_PASSWORD: havingfunwithjava
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: havingfunwithjava
      RABBITMQ_PASSWORD: havingfunwithjava
      CATALOG_SERVICE_URL: http://catalog-service:8081
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      catalog-service:
        condition: service_started
    networks:
      - havingfunwithjava-net

  payment-service:
    build:
      context: .
      dockerfile: backend/payment-service/Dockerfile
    container_name: havingfunwithjava-payment
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/havingfunwithjava
      DB_USERNAME: havingfunwithjava
      DB_PASSWORD: havingfunwithjava
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USERNAME: havingfunwithjava
      RABBITMQ_PASSWORD: havingfunwithjava
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - havingfunwithjava-net

  api-gateway:
    build:
      context: .
      dockerfile: backend/api-gateway/Dockerfile
    container_name: havingfunwithjava-api-gateway
    restart: unless-stopped
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8081
      ORDERS_SERVICE_URL: http://orders-service:8082
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      catalog-service:
        condition: service_started
      orders-service:
        condition: service_started
    networks:
      - havingfunwithjava-net

  # ---------------------------------------------------------------
  # Frontend (Vite dev server com proxy para o gateway)
  # ---------------------------------------------------------------

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8080
    container_name: havingfunwithjava-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      api-gateway:
        condition: service_started
    networks:
      - havingfunwithjava-net

  # ---------------------------------------------------------------
  # Observabilidade
  # ---------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: havingfunwithjava-prometheus
    restart: unless-stopped
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - havingfunwithjava-net

  grafana:
    image: grafana/grafana:latest
    container_name: havingfunwithjava-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
    volumes:
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - havingfunwithjava-net

volumes:
  postgres-data:
    name: havingfunwithjava-postgres-data

networks:
  havingfunwithjava-net:
    name: havingfunwithjava-net
    driver: bridge
