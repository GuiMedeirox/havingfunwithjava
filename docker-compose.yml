# Infraestrutura local para desenvolvimento da plataforma havingfunwithjava.
# Sobe o PostgreSQL compartilhado entre os serviços e o Redis usado pelo
# api-gateway como backend de rate limiting (issue #11).
# RabbitMQ, Prometheus e Grafana entram em slices futuros (issues #18, #24).
#
# Uso:
#   docker compose up -d postgres      # sobe só o banco
#   docker compose up -d redis         # sobe só o Redis
#   docker compose logs -f postgres    # acompanha logs
#   docker compose down                # para e remove containers (mantém o volume)
#   docker compose down -v             # para e APAGA o volume (cuidado: perde dados)

services:
  postgres:
    image: postgres:16-alpine
    container_name: havingfunwithjava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: havingfunwithjava
      POSTGRES_PASSWORD: havingfunwithjava
      POSTGRES_DB: havingfunwithjava
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # pg_isroot verifica se o Postgres está pronto para aceitar conexões.
      # Os serviços dependem deste healthcheck para só iniciarem após o banco estar saudável.
      test: ["CMD-SHELL", "pg_isready -U havingfunwithjava -d havingfunwithjava"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - havingfunwithjava-net

  # Redis (issue #11): backend de contadores do RequestRateLimiter do api-gateway.
  # Imagem alpine leve; sem senha (dev local). Persistência AOF desligada para
  # zerar contadores entre reinícios (desejável em dev). Em produção, habilitar
  # --requirepass via command e persistência via volume.
  redis:
    image: redis:7-alpine
    container_name: havingfunwithjava-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      # redis-cli ping responde PONG quando o Redis está pronto.
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - havingfunwithjava-net

  # api-gateway: entry point único (Spring Cloud Gateway, porta 8080).
  # Roteia /catalog/** -> catalog-service via CATALOG_SERVICE_URL.
  # Usa o Redis acima como backend de rate limiting (SPRING_DATA_REDIS_HOST=redis).
  # NOTA: o catalog-service ainda não tem serviço neste compose; quando for
  # adicionado (issue de dockerização), referencie-o por http://catalog-service:8081.
  # Por enquanto o build é opcional (comentado) — descomente quando houver um Dockerfile
  # em backend/api-gateway/Dockerfile e/ou o catalog-service estiver dockerizado.
  api-gateway:
    build:
      context: ./backend/api-gateway
      dockerfile: Dockerfile
    # image: havingfunwithjava/api-gateway:0.0.1-SNAPSHOT
    container_name: havingfunwithjava-api-gateway
    restart: unless-stopped
    environment:
      CATALOG_SERVICE_URL: http://catalog-service:8081
      # Host do Redis para o ReactiveRedisRateLimiter (nome do serviço na rede).
      SPRING_DATA_REDIS_HOST: redis
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - havingfunwithjava-net

volumes:
  postgres-data:
    name: havingfunwithjava-postgres-data

networks:
  havingfunwithjava-net:
    name: havingfunwithjava-net
    driver: bridge
