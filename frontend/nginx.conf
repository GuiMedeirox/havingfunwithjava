# Configuração do nginx para servir o SPA e fazer proxy reverso para o api-gateway.
# O browser chama apenas localhost:5173 (nginx); o nginx repassa /api/* para o gateway.
# Isso elimina problemas de CORS e firewall entre portas.

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy reverso: tudo que começa com /api/ vai para o api-gateway.
    # O frontend (Vite) usa VITE_API_URL=/api para chamar este path.
    location /api/ {
        # Remove o prefixo /api antes de repassar (proxy_pass com trailing slash).
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
