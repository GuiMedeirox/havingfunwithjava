# Configuração do nginx para servir o SPA buildado (Vite).
# Faz fallback para index.html em qualquer rota desconhecida (SPA routing)
# e repassa /catalog e /actuator para o api-gateway (definido via env no
# momento do deploy; aqui usamos um upstream padrão).

server {
    listen       80;
    server_name  _;

    # Arquivos estáticos buildados pelo Vite.
    root   /usr/share/nginx/html;
    index  index.html;

    # gzip básico.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;

    # Cache longo para assets com hash (imutáveis).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: qualquer rota desconhecida serve o index.html,
    # para que o react-router cuide do client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
